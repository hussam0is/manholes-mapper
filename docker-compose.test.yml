version: '3.8'

# Docker Compose configuration for running tests with dependencies
# Usage: docker-compose -f docker-compose.test.yml up -d

services:
  # PostgreSQL database for integration tests
  postgres:
    image: postgres:15-alpine
    container_name: manholes-test-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: manholes_test
    ports:
      - "5433:5432"  # Using 5433 to avoid conflict with local postgres
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./api/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d manholes_test"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer for database inspection (optional, useful for debugging)
  adminer:
    image: adminer:latest
    container_name: manholes-test-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    profiles:
      - debug  # Only starts with: docker-compose -f docker-compose.test.yml --profile debug up

volumes:
  postgres_test_data:
    driver: local

networks:
  default:
    name: manholes-test-network
