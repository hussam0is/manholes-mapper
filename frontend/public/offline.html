<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <title>Offline - Manhole Mapper</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Inline critical styles in case styles.css is not cached */
    .offline-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 1rem;
      background: var(--color-bg, #f8fafc);
      color: var(--color-text, #0f172a);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .offline-card {
      text-align: center;
      max-width: 520px;
      padding: 2rem;
      border-radius: 16px;
      background: var(--color-surface, #ffffff);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }
    .offline-icon {
      font-size: 4rem;
      color: var(--color-warning, #f59e0b);
      margin-bottom: 0.5rem;
      animation: offline-pulse 2s ease-in-out infinite;
    }
    @keyframes offline-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .offline-title {
      margin: 0 0 0.5rem 0;
      font-size: 1.5rem;
      font-weight: 700;
    }
    .offline-desc {
      margin: 0 0 0.75rem 0;
      color: var(--color-muted, #64748b);
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .offline-sketch-info {
      display: none;
      margin: 1rem 0;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      background: var(--color-primary-light, #eff6ff);
      border: 1px solid var(--color-primary-border, #bfdbfe);
      font-size: 0.9rem;
      color: var(--color-primary, #2563eb);
    }
    .offline-sketch-info .material-icons {
      font-size: 1.1rem;
      vertical-align: -2px;
      margin-inline-end: 4px;
    }
    .offline-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 1rem 0 0.5rem 0;
      font-size: 0.85rem;
      color: var(--color-muted, #64748b);
    }
    .offline-status .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      display: inline-block;
    }
    .offline-status.online .status-dot {
      background: #22c55e;
      animation: status-blink 1s ease-in-out 3;
    }
    @keyframes status-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .offline-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1.25rem;
    }
    .offline-retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      min-height: 44px;
      border: none;
      border-radius: 12px;
      background: var(--color-primary, #2563eb);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .offline-retry-btn:hover,
    .offline-retry-btn:active {
      background: var(--color-primary-hover, #1d4ed8);
    }
    .offline-retry-btn:active {
      transform: scale(0.97);
    }
    .offline-retry-btn .material-icons {
      font-size: 1.25rem;
    }
    .offline-home-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      min-height: 44px;
      border: 2px solid var(--color-border, #e2e8f0);
      border-radius: 12px;
      background: transparent;
      color: var(--color-text, #0f172a);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .offline-home-btn:hover {
      border-color: var(--color-primary, #2563eb);
    }
    .offline-home-btn .material-icons {
      font-size: 1.1rem;
    }
    .offline-version {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--color-muted, #94a3b8);
    }
    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      .offline-container {
        background: var(--color-bg, #0b1220);
        color: var(--color-text, #e2e8f0);
      }
      .offline-card {
        background: var(--color-surface, #0f172a);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      }
      .offline-sketch-info {
        background: rgba(37, 99, 235, 0.1);
        border-color: rgba(37, 99, 235, 0.25);
      }
      .offline-home-btn {
        color: #e2e8f0;
        border-color: #334155;
      }
    }
    /* LTR override for English */
    [dir="ltr"] .offline-title,
    [dir="ltr"] .offline-desc {
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-card">
      <div class="offline-icon material-icons">cloud_off</div>
      <!-- Hebrew (default) -->
      <h1 class="offline-title" id="offlineTitle">אין חיבור לרשת</h1>
      <p class="offline-desc" id="offlineDesc">האפליקציה לא הצליחה להתחבר לרשת. אם כבר פתחת את האפליקציה לפני כן, תוכל להמשיך לעבוד במצב לא מקוון.</p>

      <!-- Cached sketch count info -->
      <div class="offline-sketch-info" id="sketchInfo">
        <span class="material-icons">folder</span>
        <span id="sketchInfoText"></span>
      </div>

      <!-- Connection status -->
      <div class="offline-status" id="connectionStatus">
        <span class="status-dot"></span>
        <span id="statusText">לא מחובר</span>
      </div>

      <p class="offline-desc" id="offlineHint">בדוק את החיבור שלך ונסה שוב.</p>

      <div class="offline-actions">
        <button class="offline-retry-btn" onclick="location.reload()" id="offlineRetryBtn">
          <span class="material-icons">refresh</span>
          <span id="offlineRetryText">נסה שוב</span>
        </button>
        <button class="offline-home-btn" onclick="location.href='./';" id="offlineHomeBtn">
          <span class="material-icons">home</span>
          <span id="offlineHomeText">דף הבית</span>
        </button>
      </div>

      <div class="offline-version" id="versionInfo"></div>
    </div>
  </div>
  <script>
    // Auto-detect language from localStorage or browser
    (function() {
      try {
        var lang = localStorage.getItem('appLanguage') || (navigator.language || '').slice(0, 2);
        if (lang === 'en') {
          document.documentElement.lang = 'en';
          document.documentElement.dir = 'ltr';
          document.getElementById('offlineTitle').textContent = "You're offline";
          document.getElementById('offlineDesc').textContent = "The app couldn't reach the network. You can continue working if you already opened the app before going offline.";
          document.getElementById('offlineHint').textContent = 'Please check your connection and try again.';
          document.getElementById('offlineRetryText').textContent = 'Try Again';
          document.getElementById('offlineHomeText').textContent = 'Go Home';
          document.getElementById('statusText').textContent = 'Disconnected';
        }
      } catch(e) { /* ignore - keep Hebrew default */ }

      // Try to count cached sketches from IndexedDB
      function showSketchCount(count, isHebrew) {
        var infoEl = document.getElementById('sketchInfo');
        var textEl = document.getElementById('sketchInfoText');
        if (count > 0) {
          infoEl.style.display = 'block';
          textEl.textContent = isHebrew
            ? count + ' שרטוטים שמורים במכשיר שלך'
            : count + ' sketch' + (count !== 1 ? 'es' : '') + ' saved on your device';
        }
      }

      var isHeb = (document.documentElement.lang || 'he').startsWith('he');
      // Attempt to read sketch count from IndexedDB (graph-sketcher store)
      try {
        var dbNames = ['graph-sketcher', 'manholeMapper', 'sketches'];
        function tryDB(names, idx) {
          if (idx >= names.length) return;
          var req = indexedDB.open(names[idx]);
          req.onsuccess = function(e) {
            var db = e.target.result;
            var storeNames = Array.from(db.objectStoreNames || []);
            if (storeNames.length === 0) {
              db.close();
              tryDB(names, idx + 1);
              return;
            }
            // Try common store names
            var target = storeNames.find(function(s) {
              return /sketch/i.test(s) || s === 'saves' || s === 'documents';
            }) || storeNames[0];
            try {
              var tx = db.transaction(target, 'readonly');
              var store = tx.objectStore(target);
              var countReq = store.count();
              countReq.onsuccess = function() {
                showSketchCount(countReq.result, isHeb);
              };
            } catch(ex) { /* ignore */ }
            db.close();
          };
          req.onerror = function() { tryDB(names, idx + 1); };
        }
        tryDB(dbNames, 0);
      } catch(e) { /* IndexedDB not available */ }

      // Also try localStorage sketch count
      try {
        var keys = Object.keys(localStorage);
        var sketchKeys = keys.filter(function(k) {
          return /sketch/i.test(k) || /^save_/i.test(k);
        });
        if (sketchKeys.length > 0) {
          showSketchCount(sketchKeys.length, isHeb);
        }
      } catch(e) { /* ignore */ }

      // Monitor connection status
      function updateStatus() {
        var statusEl = document.getElementById('connectionStatus');
        var textEl = document.getElementById('statusText');
        var isEn = document.documentElement.lang === 'en';
        if (navigator.onLine) {
          statusEl.className = 'offline-status online';
          textEl.textContent = isEn ? 'Connection restored — tap Try Again' : 'החיבור חזר — לחץ נסה שוב';
        } else {
          statusEl.className = 'offline-status';
          textEl.textContent = isEn ? 'Disconnected' : 'לא מחובר';
        }
      }
      window.addEventListener('online', updateStatus);
      window.addEventListener('offline', updateStatus);
      updateStatus();

      // Show SW version if available
      if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({ type: 'GET_VERSION' });
        navigator.serviceWorker.addEventListener('message', function(e) {
          if (e.data && e.data.type === 'SW_VERSION') {
            document.getElementById('versionInfo').textContent = 'Service Worker ' + e.data.version;
          }
        });
      }
    })();
  </script>
</body>
</html>
